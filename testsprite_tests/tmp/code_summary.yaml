  - name: Dashboard API
    description: Dashboard summary and analytics for tenant admins
    files:
      - src/ApartmentManagement.API/Controllers/DashboardController.cs
    endpoints:
      - method: GET
        path: /api/v1.0/dashboard/summary
        description: Dashboard summary
        auth_required: true
      - method: GET
        path: /api/v1.0/dashboard/membership-fee-trend
        description: Dues trend chart data
        auth_required: true
      - method: GET
        path: /api/v1.0/dashboard/recent-activities
        description: Recent activities feed
        auth_required: true
    depends_on:
      - Authentication API

  - name: Health Checks
    description: Liveness and readiness probes
    files:
      - src/ApartmentManagement.API/Program.cs
    endpoints:
      - method: GET
        path: /health/live
        description: Liveness probe
        auth_required: false
      - method: GET
        path: /health/ready
        description: Readiness probe
        auth_required: false
    depends_on: []

known_limitations: []
